name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: Qaas.Mocker.CommunicationObjects.sln
  COVERAGE_SOLUTION_PATH: Qaas.Mocker.CommunicationObjects.sln
  PROJECT_TO_PACK: Qaas.Mocker.CommunicationObjects/Qaas.Mocker.CommunicationObjects.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput
  RESTORED_PACKAGES_PATH: ${{ github.workspace }}\RestoredPackages
  COVERAGE_RESULTS_DIRECTORY: ${{ github.workspace }}\CoverageResults
  COVERAGE_RESULTS_PATH: ${{ github.workspace }}\CoverageResults\coverage.xml
  COVERAGE_REPORT_DIRECTORY: ${{ github.workspace }}\CoverageReport
  FILTERED_COVERAGE_RESULTS_PATH: ${{ github.workspace }}\CoverageReport\Cobertura.xml

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: stable_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_stable_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update changelog
        shell: bash
        run: |
          render_section() {
            local title="$1"
            local date="$2"
            local revision="$3"

            echo "## $title${date:+ - $date}"
            echo

            local has_changes=false
            while IFS= read -r subject; do
              if [[ -z "$subject" ]]; then
                continue
              fi

              if [[ "$subject" =~ ^docs\(changelog\):\ update\ changelog(\ \[skip\ ci\])?$ ]]; then
                continue
              fi

              echo "- $subject"
              has_changes=true
            done < <(git log --no-merges --format='%s' "$revision")

            if [[ "$has_changes" == false ]]; then
              echo "- No changes recorded."
            fi

            echo
          }

          {
            echo "# Changelog"
            echo
            echo "This file is generated automatically from CI from git history."
            echo

            mapfile -t tag_names < <(git for-each-ref --sort=-version:refname --format='%(refname:strip=2)' refs/tags)
            mapfile -t tag_dates < <(git for-each-ref --sort=-version:refname --format='%(creatordate:short)' refs/tags)

            if [[ ${#tag_names[@]} -gt 0 ]]; then
              render_section "Unreleased" "" "${tag_names[0]}..HEAD"
            else
              render_section "Unreleased" "" "HEAD"
            fi

            for ((index=0; index<${#tag_names[@]}; index++)); do
              current_tag="${tag_names[index]}"
              current_date="${tag_dates[index]}"
              if (( index + 1 < ${#tag_names[@]} )); then
                render_section "$current_tag" "$current_date" "${tag_names[index + 1]}..$current_tag"
              else
                render_section "$current_tag" "$current_date" "$current_tag"
              fi
            done
          } > CHANGELOG.md

      - name: Validate publish tag compatibility
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          [xml]$projectXml = Get-Content "${{ env.PROJECT_TO_PACK }}"
          $frameworkSdkVersion = @($projectXml.Project.ItemGroup.PackageReference | Where-Object {
            $_.Include -eq 'QaaS.Framework.SDK'
          } | ForEach-Object {
            $_.Version
          } | Where-Object {
            -not [string]::IsNullOrWhiteSpace($_)
          }) | Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($frameworkSdkVersion)) {
            Write-Host "No QaaS.Framework.SDK dependency found. Skipping prerelease dependency validation."
            exit 0
          }

          $packageVersion = "${{ steps.stable_tag.outputs.tag }}"
          $dependsOnPrereleaseFramework = $frameworkSdkVersion.Contains('-')
          $isPrereleaseTag = $packageVersion.Contains('-')

          if ($dependsOnPrereleaseFramework -and -not $isPrereleaseTag) {
            throw "Stable tag '$packageVersion' cannot publish while QaaS.Framework.SDK dependency '$frameworkSdkVersion' is prerelease."
          }

      - name: Install coverage tools
        shell: pwsh
        run: |
          dotnet tool update --global dotnet-coverage
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global dotnet-coverage
            if ($LASTEXITCODE -ne 0) {
              throw "Unable to install dotnet-coverage."
            }
          }

          dotnet tool update --global dotnet-reportgenerator-globaltool
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global dotnet-reportgenerator-globaltool
            if ($LASTEXITCODE -ne 0) {
              throw "Unable to install dotnet-reportgenerator-globaltool."
            }
          }

          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }} --packages ${{ env.RESTORED_PACKAGES_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Resolve coverage scope
        shell: pwsh
        run: |
          function Get-AssemblyName([string]$projectPath) {
            [xml]$project = Get-Content $projectPath
            $assemblyName = @($project.Project.PropertyGroup.AssemblyName | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }) | Select-Object -First 1
            if ([string]::IsNullOrWhiteSpace($assemblyName)) {
              $assemblyName = [System.IO.Path]::GetFileNameWithoutExtension($projectPath)
            }

            return [string]$assemblyName
          }

          function Test-IsTestProject([string]$projectPath) {
            $projectName = [System.IO.Path]::GetFileNameWithoutExtension($projectPath)
            if ($projectName -like '*.Tests' -or $projectName -like '*.E2ETests') {
              return $true
            }

            [xml]$project = Get-Content $projectPath
            $isTestProject = @($project.Project.PropertyGroup.IsTestProject | Where-Object {
              $_ -and $_.Trim().Equals('true', [System.StringComparison]::OrdinalIgnoreCase)
            }).Count -gt 0
            if ($isTestProject) {
              return $true
            }

            return @($project.Project.ItemGroup.PackageReference | Where-Object {
              $_.Include -eq 'Microsoft.NET.Test.Sdk'
            }).Count -gt 0
          }

          $solutionEntries = dotnet sln "${{ env.COVERAGE_SOLUTION_PATH }}" list
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to list projects for coverage scope."
          }

          $projectPaths = $solutionEntries | Select-Object -Skip 2 | Where-Object {
            -not [string]::IsNullOrWhiteSpace($_)
          } | ForEach-Object {
            Join-Path $env:GITHUB_WORKSPACE $_.Trim()
          }

          $assemblyNames = foreach ($projectPath in $projectPaths) {
            if (-not (Test-Path $projectPath)) {
              throw "Coverage scope project '$projectPath' was not found."
            }

            if (Test-IsTestProject $projectPath) {
              continue
            }

            Get-AssemblyName $projectPath
          }

          $assemblyNames = $assemblyNames | Sort-Object -Unique
          if (@($assemblyNames).Count -eq 0) {
            throw "No non-test solution assemblies were resolved for coverage."
          }

          $assemblyFilters = ($assemblyNames | ForEach-Object { "+$_" }) -join ';'
          Add-Content -Path $env:GITHUB_ENV -Value "COVERAGE_ASSEMBLY_FILTERS=$assemblyFilters"
          Add-Content -Path $env:GITHUB_ENV -Value "COVERAGE_INCLUDED_ASSEMBLIES=$($assemblyNames -join ', ')"
          Write-Host "Coverage assemblies: $($assemblyNames -join ', ')"

      - name: Collect coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ env.COVERAGE_RESULTS_DIRECTORY }}" -Force | Out-Null
          dotnet-coverage collect dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --no-build --maxcpucount -f cobertura -o "${{ env.COVERAGE_RESULTS_PATH }}"

      - name: Generate coverage reports
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ env.COVERAGE_REPORT_DIRECTORY }}" -Force | Out-Null
          reportgenerator "-reports:${{ env.COVERAGE_RESULTS_PATH }}" "-targetdir:${{ env.COVERAGE_REPORT_DIRECTORY }}" "-reporttypes:Html;MarkdownSummaryGithub;Cobertura" "-assemblyfilters:$env:COVERAGE_ASSEMBLY_FILTERS" "-verbosity:Error"

      - name: Log coverage totals
        shell: pwsh
        run: |
          [xml]$coverage = Get-Content "${{ env.FILTERED_COVERAGE_RESULTS_PATH }}"
          $linePercent = [math]::Round([double]$coverage.coverage.'line-rate' * 100, 1)
          $branchPercent = [math]::Round([double]$coverage.coverage.'branch-rate' * 100, 1)
          Write-Host "Solution line coverage (excluding test projects): $linePercent%"
          Write-Host "Solution branch coverage (excluding test projects): $branchPercent%"
          Write-Host "Included assemblies: $env:COVERAGE_INCLUDED_ASSEMBLIES"

      - name: Publish coverage job summary
        shell: pwsh
        run: |
          $summaryFile = Get-ChildItem "${{ env.COVERAGE_REPORT_DIRECTORY }}" -File | Where-Object {
            $_.Name -like "Summary*.md"
          } | Select-Object -First 1

          if ($null -eq $summaryFile) {
            throw "Coverage summary markdown file was not generated."
          }

          Get-Content $summaryFile.FullName | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Update coverage gist badge
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          $rawGistId = if ($null -eq $env:GIST_ID) { '' } else { $env:GIST_ID }
          $rawGistToken = if ($null -eq $env:GIST_TOKEN) { '' } else { $env:GIST_TOKEN }
          $gistId = -join ($rawGistId.ToCharArray() | Where-Object { [int][char]$_ -ge 33 -and [int][char]$_ -le 126 })
          $gistToken = -join ($rawGistToken.ToCharArray() | Where-Object { [int][char]$_ -ge 33 -and [int][char]$_ -le 126 })

          if ([string]::IsNullOrWhiteSpace($gistId) -or [string]::IsNullOrWhiteSpace($gistToken)) {
            Write-Host "Gist secrets are not configured. Skipping badge update."
            exit 0
          }

          function Get-BadgeColor([double]$value) {
            if ($value -ge 90) { return "brightgreen" }
            if ($value -ge 75) { return "green" }
            if ($value -ge 60) { return "yellow" }
            if ($value -ge 40) { return "orange" }
            return "red"
          }

          [xml]$coverage = Get-Content "${{ env.FILTERED_COVERAGE_RESULTS_PATH }}"
          $linePercent = [math]::Round([double]$coverage.coverage.'line-rate' * 100, 1)
          $branchPercent = [math]::Round([double]$coverage.coverage.'branch-rate' * 100, 1)
          $lineColor = Get-BadgeColor $linePercent
          $branchColor = Get-BadgeColor $branchPercent

          $gistBody = @{
            files = @{
              "line-coverage-badge.json" = @{
                content = (@{
                  schemaVersion = 1
                  label = "Line"
                  message = "$linePercent%"
                  color = $lineColor
                } | ConvertTo-Json -Compress)
              }
              "branch-coverage-badge.json" = @{
                content = (@{
                  schemaVersion = 1
                  label = "Branch"
                  message = "$branchPercent%"
                  color = $branchColor
                } | ConvertTo-Json -Compress)
              }
            }
          } | ConvertTo-Json -Depth 5

          $headers = @{
            Authorization = "Bearer $gistToken"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          Invoke-RestMethod -Uri "https://api.github.com/gists/$gistId" -Method Patch -Headers $headers -ContentType "application/json" -Body $gistBody | Out-Null

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_REPORT_DIRECTORY }}
          if-no-files-found: error
          retention-days: 7

      - name: Commit changelog updates
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') && github.actor != 'github-actions[bot]'
        shell: pwsh
        run: |
          git diff --quiet -- CHANGELOG.md
          if ($LASTEXITCODE -eq 0) {
            Write-Host "CHANGELOG.md is already up to date."
            exit 0
          }

          git config user.name "qaas-changelog-bot"
          git config user.email "qaas-changelog-bot@example.local"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update changelog [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Pack QaaS.Mocker.CommunicationObjects
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:DebugType=portable `
            -p:SymbolPackageFormat=snupkg `
            -p:PackageVersion=${{ steps.stable_tag.outputs.tag }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Stage packed packages in restored packages artifact
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          $pattern = '^(?<id>.+?)\.(?<version>\d+(?:\.\d+){1,3}(?:-[0-9A-Za-z][0-9A-Za-z.-]*)?(?:\+[0-9A-Za-z][0-9A-Za-z.-]*)?)\.(?<extension>nupkg|snupkg)$'
          $packageFiles = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}" -File | Where-Object {
            $_.Extension -in '.nupkg', '.snupkg'
          }

          foreach ($packageFile in $packageFiles) {
            $match = [regex]::Match($packageFile.Name, $pattern, [System.Text.RegularExpressions.RegexOptions]::IgnoreCase)
            if (-not $match.Success) {
              throw "Unable to determine package id and version from '$($packageFile.Name)'."
            }

            $packageId = $match.Groups['id'].Value.ToLowerInvariant()
            $packageVersion = $match.Groups['version'].Value
            $versionDirectory = Join-Path "${{ env.RESTORED_PACKAGES_PATH }}" $packageId
            $versionDirectory = Join-Path $versionDirectory $packageVersion

            New-Item -ItemType Directory -Path $versionDirectory -Force | Out-Null
            Copy-Item $packageFile.FullName $versionDirectory -Force
          }

      - name: Push QaaS.Mocker.CommunicationObjects to NuGet
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: powershell
        run: |
          $packages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Mocker.CommunicationObjects.*.nupkg"
          foreach ($package in $packages) {
            if ($package.Name -match "^QaaS\.Mocker\.CommunicationObjects\.[0-9]") {
              dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json
            }
          }

      - name: Push QaaS.Mocker.CommunicationObjects symbols to NuGet
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          $symbolPackages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}" -Filter "*.snupkg" -File
          foreach ($package in $symbolPackages) {
            dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Write restored packages metadata
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          $metadata = @{
            repository = "${{ github.repository }}"
            tag = "${{ steps.stable_tag.outputs.tag }}"
            runId = "${{ github.run_id }}"
            createdAtUtc = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json

          $metadataPath = Join-Path "${{ env.RESTORED_PACKAGES_PATH }}" "restore-artifact-metadata.json"
          $metadata | Set-Content -Path $metadataPath

      - name: Upload restored packages artifact
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: restored-packages
          path: ${{ env.RESTORED_PACKAGES_PATH }}
          if-no-files-found: error
          retention-days: 7
